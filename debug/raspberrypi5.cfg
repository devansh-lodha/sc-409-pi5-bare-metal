# This script defines the physical debug architecture of the BCM2712 chip.

# The Pi 5 uses a specific reset configuration. We tell OpenOCD to only use 
# the system reset line (srst) and that it uses a push-pull electrical setup.
reset_config srst_push_pull srst_only

set _CHIPNAME bcm2712
set _DAP_TAPID 0x4ba00477
set _CHIPCORES 4

# Initialize the Serial Wire Debug (SWD) port and connect to the Debug Access Port (DAP)
swd newdap $_CHIPNAME cpu -expected-id $_DAP_TAPID
dap create $_CHIPNAME.dap -chain-position $_CHIPNAME.cpu

# These are the hardcoded physical addresses of the debug hardware (CoreSight)
set _DBGBASE {0x80010000 0x80110000 0x80210000 0x80310000}
set _CTIBASE {0x80020000 0x80120000 0x80220000 0x80320000}

# Loop through all 4 Cortex-A76 cores and register them with OpenOCD
for { set _core 0 } { $_core < $_CHIPCORES } { incr _core } {
    set _CTINAME $_CHIPNAME.cti$_core
    set _TARGETNAME $_CHIPNAME.cpu$_core
    
    # CTI = Cross Trigger Interface. Used to halt all cores simultaneously.
    cti create $_CTINAME -dap $_CHIPNAME.dap -ap-num 0 -baseaddr [lindex $_CTIBASE $_core]
    
    # Register the actual CPU core
    target create $_TARGETNAME aarch64 -dap $_CHIPNAME.dap -coreid $_core -dbgbase [lindex $_DBGBASE $_core] -cti $_CTINAME
    
    # When GDB attaches, automatically halt this core.
    $_TARGETNAME configure -event gdb-attach { halt }
}

# Tell OpenOCD that Core 0 is our primary debug target.
targets $_CHIPNAME.cpu0
init

# When the system resets, instantly halt Core 0 before it can execute code.
$_CHIPNAME.cpu0 configure -event reset-init { halt }
